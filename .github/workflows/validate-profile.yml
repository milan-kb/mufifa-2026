name: μFIFA Profile Validator

on:
  pull_request:
    branches:
      - main
    paths:
      - "profile/**.md"
      - "profile/**.MD"

jobs:
  validate-profile:
    name: Validate Player Profile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get changed profile files
        id: changed
        run: |
          # Find all profile/*.md files changed in this PR
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -i '^profile/.*\.md$' \
            | grep -ivE 'example@mulearn|sachinrajm@mulearn' \
            || true)

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -z "$FILES" ]; then
            echo "no_profiles=true" >> $GITHUB_OUTPUT
          else
            echo "no_profiles=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no profile files changed
        if: steps.changed.outputs.no_profiles == 'true'
        run: |
          echo "No profile files changed in this PR - skipping validation."

      - name: Validate profile files
        if: steps.changed.outputs.no_profiles == 'false'
        env:
          NO_COLOR: ""
          GITHUB_ACTIONS: "true"
        run: |
          FAILED=0
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            echo "::group::Validating $FILE"
            python3 scripts/validate_profile.py "$FILE" || FAILED=1
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.files }}"

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "::error::One or more profile files failed validation."
            echo "Fix the errors shown above, push your changes, and the check will re-run."
            exit 1
          fi

      - name: All profiles valid
        if: steps.changed.outputs.no_profiles == 'false'
        run: |
          echo "✓ All profile files passed validation. Welcome to μFIFA! ⚽"
